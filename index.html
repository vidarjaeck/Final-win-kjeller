function drinkWindowStatus(w){
  var f=parseInt(w.drink_from),u=parseInt(w.drink_until);
  if(!f||!u) return {label:"Ukjent",color:"#9ca3af"};
  if(currentYear<f) return {label:"For ung",color:"#60a5fa"};
  if(currentYear>u) return {label:"Passert",color:"#f87171"};
  var pct=(currentYear-f)/(u-f);
  if(pct<0.4) return {label:"Klar",color:"#34d399"};
  if(pct<0.75) return {label:"Prime",color:"#a78bfa"};
  return {label:"Drink naa",color:"#fb923c"};
}

function groupWines(wines){
  var g={};
  wines.forEach(function(w){
    var type=w.type||"Annet",country=w.country||"Ukjent",region=w.region||"Ukjent",sub=w.subregion||"";
    if(!g[type])g[type]={};if(!g[type][country])g[type][country]={};
    if(!g[type][country][region])g[type][country][region]={};
    if(!g[type][country][region][sub])g[type][country][region][sub]=[];
    g[type][country][region][sub].push(w);
  });
  return g;
}

        <div style=${{display:"flex",gap:6,marginBottom:10}}>
          <button onClick=${function(){setShowWishlist(false);setActiveFilter("all")}} style=${{flex:1,padding:"8px",borderRadius:8,background:!showWishlist?"rgba(124,58,237,0.3)":"transparent",border:"1px solid "+(!showWishlist?"#7c3aed":"#3a2a4a"),color:!showWishlist?"#c4b5fd":"#6b7280",cursor:"pointer",fontSize:12,fontWeight:!showWishlist?600:400}}>Kjeller (${cellarWines.length})</button>
          <button onClick=${function(){setShowWishlist(true)}} style=${{flex:1,padding:"8px",borderRadius:8,background:showWishlist?"rgba(245,158,11,0.2)":"transparent",border:"1px solid "+(showWishlist?"rgba(245,158,11,0.4)":"#3a2a4a"),color:showWishlist?"#f59e0b":"#6b7280",cursor:"pointer",fontSize:12,fontWeight:showWishlist?600:400}}>Oenskeliste (${wishlistWines.length})</button>
        </div>
        ${!showWishlist&&html`<div style=${{display:"flex",gap:4,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
          ${FILTER_OPTIONS.map(function(f){var isActive=activeFilter===f.key;return html`<button key=${f.key} onClick=${function(){setActiveFilter(f.key)}} style=${{padding:"5px 10px",borderRadius:16,background:isActive?(f.color||"#7c3aed")+"22":"transparent",border:"1px solid "+(isActive?(f.color||"#7c3aed")+"66":"#2a1a3a"),color:isActive?(f.color||"#c4b5fd"):"#6b7280",cursor:"pointer",fontSize:11,whiteSpace:"nowrap",fontWeight:isActive?600:400}}>${f.label}</button>`})}
        </div>`}
        ${loadingDb?html`<div style=${{textAlign:"center",padding:40,color:"#a78bfa"}}>Laster kjelleren...</div>`:html`<div>
          ${filteredWines.length===0&&html`<div style=${{textAlign:"center",color:"#6b7280",padding:40}}>${showWishlist?"Oenskelisten er tom.":activeFilter!=="all"?"Ingen viner med denne statusen.":"Ingen viner ennaa."}</div>`}
          ${TYPE_ORDER.filter(function(ty){return grouped[ty]}).map(function(type){
            var tk="t_"+type;
            var allW=[];Object.keys(grouped[type]).forEach(function(c){Object.keys(grouped[type][c]).forEach(function(r){Object.keys(grouped[type][c][r]).forEach(function(s){allW=allW.concat(grouped[type][c][r][s])})})});
            var tot=allW.reduce(function(a,w){return a+(parseInt(w.quantity)||0)},0);
            return html`<div key=${type} style=${{marginBottom:8}}>
              <button onClick=${function(){toggleCollapse(tk)}} style=${{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"rgba(124,58,237,0.2)",border:"1px solid rgba(124,58,237,0.27)",borderRadius:10,cursor:"pointer",marginBottom:4}}>
                <span style=${{fontWeight:700,fontSize:15,color:"#e9d5ff"}}>${type}</span>
                <span style=${{color:"#a78bfa",fontSize:12}}>${tot} fl - ${allW.length} ${collapsed[tk]?">":"v"}</span>
              </button>
              ${!collapsed[tk]&&Object.keys(grouped[type]).map(function(country){
                var ck="c_"+type+"_"+country;
                return html`<div key=${country} style=${{marginLeft:8,marginBottom:4}}>
                  <button onClick=${function(){toggleCollapse(ck)}} style=${{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"rgba(255,255,255,0.04)",border:"1px solid #2a1a3a",borderRadius:8,cursor:"pointer",marginBottom:3}}>
                    <span style=${{fontWeight:600,fontSize:13,color:"#c4b5fd"}}>${country}</span>
                    <span style=${{color:"#6b7280",fontSize:11}}>${collapsed[ck]?">":" v"}</span>
                  </button>
                  ${!collapsed[ck]&&Object.keys(grouped[type][country]).map(function(region){
                    var rk="r_"+type+"_"+country+"_"+region;
                    return html`<div key=${region} style=${{marginLeft:8,marginBottom:4}}>
                      <button onClick=${function(){toggleCollapse(rk)}} style=${{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px",background:"rgba(255,255,255,0.02)",border:"1px solid #1a0d2e",borderRadius:8,cursor:"pointer",marginBottom:3}}>
                        <span style=${{fontSize:12,color:"#9ca3af"}}>${region}</span>
                      </button>
                      ${!collapsed[rk]&&Object.keys(grouped[type][country][region]).map(function(sub){
                        return html`<div key=${sub||"_"} style=${{marginLeft:8}}>${grouped[type][country][region][sub].map(function(w){return html`<${WineCard} key=${w.id} wine=${w}/>`})}</div>`;
                      })}
                    </div>`;
                  })}
                </div>`;
              })}
            </div>`;
          })}
        </div>`}
      </div>`}

      ${tab===1&&html`<div style=${{display:"flex",flexDirection:"column",height:"calc(100vh - 200px)"}}>
        <div style=${{display:"flex",justifyContent:"flex-end",marginBottom:8}}><button onClick=${clearChat} style=${{padding:"4px 10px",borderRadius:12,background:"transparent",border:"1px solid #3a2a4a",color:"#6b7280",fontSize:11,cursor:"pointer"}}>Toom chat</button></div>
        <div style=${{flex:1,overflowY:"auto",paddingBottom:8}}>
          ${messages.map(function(m,i){return html`<div key=${i} style=${{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:12}}>
            <div style=${{maxWidth:"85%",padding:"10px 14px",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",background:m.role==="user"?"linear-gradient(135deg,#7c3aed,#5b21b6)":"rgba(255,255,255,0.06)",border:m.role==="assistant"?"1px solid #2a1a3a":"none",fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>${m.role==="assistant"?renderChatWithLinks(m.content):m.content}</div>
          </div>`})}
          ${chatLoading&&html`<div style=${{display:"flex",justifyContent:"flex-start",marginBottom:12}}><div style=${{padding:"10px 14px",borderRadius:"18px 18px 18px 4px",background:"rgba(255,255,255,0.06)",border:"1px solid #2a1a3a",fontSize:14}}>Tenker...</div></div>`}
          <div ref=${chatEndRef}/>
        </div>
        <div style=${{display:"flex",gap:8,paddingTop:8,borderTop:"1px solid #2a1a3a"}}>
          <input value=${chatInput} onChange=${function(e){setChatInput(e.target.value)}} onKeyDown=${function(e){if(e.key==="Enter")sendMessage()}} placeholder="Hva skal du spise?" style=${{flex:1,padding:"12px 14px",borderRadius:24,border:"1px solid #3a2a4a",background:"#1e1228",color:"#f3e8ff",fontSize:14}}/>
          <button onClick=${sendMessage} disabled=${chatLoading} style=${{padding:"12px 16px",borderRadius:24,background:chatLoading?"#3a2a4a":"linear-gradient(135deg,#7c3aed,#5b21b6)",border:"none",color:"white",cursor:"pointer",fontSize:18}}>${"\u2192"}</button>
        </div>
      </div>`}

      ${tab===2&&html`<div>
        <div style=${{marginBottom:16,padding:14,background:"rgba(124,58,237,0.1)",border:"1px solid rgba(124,58,237,0.27)",borderRadius:12}}>
          <div style=${{fontSize:14,color:"#c4b5fd",marginBottom:10,textAlign:"center",fontWeight:600}}>${"\uD83D\uDCF7"} Ta bilde av etiketten</div>
          <div style=${{fontSize:12,color:"#9ca3af",marginBottom:10,textAlign:"center"}}>AI fyller ut alle feltene automatisk</div>
          <input ref=${fileRef} type="file" accept="image/*" capture="environment" onChange=${handleImage} style=${{display:"none"}}/>
          <div style=${{display:"flex",gap:8}}>
            <button onClick=${function(){fileRef.current.setAttribute("capture","environment");fileRef.current.click()}} disabled=${imageLoading} style=${{flex:1,padding:"12px",borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#5b21b6)",border:"none",color:"white",cursor:"pointer",fontSize:14,fontWeight:600}}>${"\uD83D\uDCF7"} Kamera</button>
            <button onClick=${function(){fileRef.current.removeAttribute("capture");fileRef.current.click()}} disabled=${imageLoading} style=${{flex:1,padding:"12px",borderRadius:10,background:"rgba(124,58,237,0.3)",border:"1px solid rgba(124,58,237,0.4)",color:"#c4b5fd",cursor:"pointer",fontSize:14}}>${"\uD83D\uDCC1"} Velg bilde</button>
          </div>
          ${imageLoading&&html`<div style=${{textAlign:"center",color:"#a78bfa",fontSize:13,marginTop:10}}><span class="spinner" style=${{width:14,height:14}}></span> Analyserer etikett...</div>`}
          ${aiQuestions&&html`<div style=${{marginTop:10,padding:12,background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:10}}>
            <div style=${{fontSize:12,color:"#f59e0b",fontWeight:600,marginBottom:6}}>AI trenger hjelp:</div>
            ${aiQuestions.map(function(q,i){return html`<div key=${i} style=${{fontSize:13,color:"#f3e8ff",marginBottom:4}}>${q}</div>`})}
            <div style=${{display:"flex",gap:8,marginTop:8}}>
              <input placeholder="Skriv svar her..." value=${aiAnswer} onChange=${function(e){setAiAnswer(e.target.value)}} onKeyDown=${function(e){if(e.key==="Enter")submitAiAnswer()}} style=${{flex:1,padding:"8px 10px",borderRadius:8,border:"1px solid rgba(245,158,11,0.3)",background:"#1e1228",color:"#f3e8ff",fontSize:13}}/>
              <button onClick=${submitAiAnswer} style=${{padding:"8px 14px",borderRadius:8,background:"rgba(245,158,11,0.3)",border:"1px solid rgba(245,158,11,0.4)",color:"#f59e0b",cursor:"pointer",fontSize:13}}>Svar</button>
            </div>
          </div>`}
          ${imgPreview&&!imageLoading&&html`<div style=${{marginTop:10,textAlign:"center"}}><img src=${imgPreview} style=${{maxHeight:120,maxWidth:"100%",borderRadius:8,border:"1px solid #3a2a4a",objectFit:"contain"}}/></div>`}
        </div>
        <div style=${{marginBottom:16}}>
          <div style=${{fontSize:11,color:"#a78bfa",marginBottom:4}}>ELLER SOK PA VINNAVN</div>
          <div style=${{display:"flex",gap:8}}>
            <input placeholder="f.eks. Barolo Riserva 2018" value=${searchQuery} onChange=${function(e){setSearchQuery(e.target.value)}} onKeyDown=${function(e){if(e.key==="Enter")doWineSearch()}} style=${Object.assign({},iS,{marginBottom:0,flex:1})}/>
            <button onClick=${doWineSearch} disabled=${searchLoading} style=${{padding:"10px 14px",borderRadius:8,background:searchLoading?"#3a2a4a":"linear-gradient(135deg,#7c3aed,#5b21b6)",border:"none",color:"white",cursor:"pointer",fontSize:13}}>${searchLoading?"...":"Sok"}</button>
          </div>
        </div>
        ${addStatus&&html`<div class="fade-in" style=${{padding:10,borderRadius:8,background:"rgba(167,139,250,0.1)",fontSize:13,marginBottom:12,textAlign:"center"}}>${addStatus}</div>`}
        <div style=${{textAlign:"center",color:"#6b7280",fontSize:11,marginBottom:8}}>--- bekreft eller fyll inn manuelt ---</div>
        ${inp("producer","Produsent",newWine,setNewWine)}
        ${inp("name","Vinnavn / Cuvee *",newWine,setNewWine)}
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>${numI("vintage","Aargang *",newWine,setNewWine)}${numI("quantity","Antall",newWine,setNewWine)}</div>
        ${inp("region","Region / Appellation",newWine,setNewWine)}
        ${inp("subregion","Underdistrikt",newWine,setNewWine)}
        ${inp("country","Land",newWine,setNewWine)}
        ${inp("grape","Drue(r)",newWine,setNewWine)}
        ${inp("classification","Klassifikasjon (Grand Cru, DOC...)",newWine,setNewWine)}
        ${selI(newWine,setNewWine)}
        <button onClick=${reAnalyzeWithCorrections} disabled=${imageLoading} style=${{width:"100%",padding:"10px",borderRadius:8,background:"rgba(52,211,153,0.15)",border:"1px solid rgba(52,211,153,0.3)",color:"#34d399",cursor:"pointer",fontSize:12,marginBottom:8}}>${imageLoading?"Oppdaterer...":"Har du endret noe? Trykk her for aa oppdatere resten med AI"}</button>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>${numI("drink_from","Drikk fra (aar)",newWine,setNewWine)}${numI("drink_until","Drikk innen (aar)",newWine,setNewWine)}</div>
        ${inp("temp","Serveringstemperatur",newWine,setNewWine)}
        ${inp("decant","Dekantering",newWine,setNewWine)}
        ${inp("notes","Smaksnotater",newWine,setNewWine)}
        ${inp("food_pairing","Passer til (mat)",newWine,setNewWine)}
        ${inp("price","Pris (NOK)",newWine,setNewWine)}
        <div style=${{marginBottom:16,padding:14,background:"rgba(255,255,255,0.03)",border:"1px solid #2a1a3a",borderRadius:12}}>
          <div style=${{fontSize:11,color:"#a78bfa",marginBottom:6}}>AI-VURDERING (0-100 poeng)</div>
          <div style=${{display:"flex",alignItems:"center",gap:12}}>
            <input type="number" min="0" max="100" placeholder="0-100" value=${newWine.rating||""} onChange=${function(e){setNewWine(function(p){return Object.assign({},p,{rating:e.target.value})})}} style=${Object.assign({},iS,{marginBottom:0,width:80,textAlign:"center",fontSize:18,fontWeight:700})}/>
            <div style=${{fontSize:12,color:"#9ca3af"}}>${parseInt(newWine.rating)>=95?"Eksepsjonell":parseInt(newWine.rating)>=90?"Utmerket":parseInt(newWine.rating)>=85?"Veldig bra":parseInt(newWine.rating)>=80?"Bra":"Ikke vurdert"}</div>
          </div>
        </div>
        <div style=${{display:"flex",gap:8,marginBottom:24}}>
          <button onClick=${addWine} style=${{flex:2,padding:14,borderRadius:12,background:"linear-gradient(135deg,#7c3aed,#5b21b6)",border:"none",color:"white",fontSize:15,fontWeight:600,cursor:"pointer"}}>Legg til i kjelleren</button>
          <button onClick=${function(){if(!newWine.name||!newWine.vintage){setAddStatus("Navn og aargang kreves.");return;}doAddWine("wishlist")}} style=${{flex:1,padding:14,borderRadius:12,background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.3)",color:"#f59e0b",fontSize:13,fontWeight:600,cursor:"pointer"}}>Oenskeliste</button>
        </div>
      </div>`}

      ${tab===3&&html`<div>
        <div style=${{fontSize:15,fontWeight:700,marginBottom:12}}>Del viner med venner</div>
        ${shareStatus&&html`<div style=${{padding:10,borderRadius:8,background:"rgba(167,139,250,0.1)",fontSize:13,marginBottom:10,textAlign:"center"}}>${shareStatus}</div>`}
        <div style=${{fontSize:11,color:"#a78bfa",marginBottom:4}}>HVA VIL DU DELE?</div>
        <div style=${{display:"flex",gap:8,marginBottom:12}}>
          <button onClick=${function(){setShareType("collection");setShareWineId(null)}} style=${{flex:1,padding:"10px",borderRadius:8,background:shareType==="collection"?"rgba(124,58,237,0.3)":"transparent",border:"1px solid "+(shareType==="collection"?"#7c3aed":"#3a2a4a"),color:shareType==="collection"?"#c4b5fd":"#9ca3af",cursor:"pointer",fontSize:13}}>Hele samlingen</button>
          <button onClick=${function(){setShareType("wine")}} style=${{flex:1,padding:"10px",borderRadius:8,background:shareType==="wine"?"rgba(124,58,237,0.3)":"transparent",border:"1px solid "+(shareType==="wine"?"#7c3aed":"#3a2a4a"),color:shareType==="wine"?"#c4b5fd":"#9ca3af",cursor:"pointer",fontSize:13}}>Enkeltvin</button>
        </div>
        ${shareType==="wine"&&html`<div style=${{marginBottom:12}}>
          <div style=${{fontSize:11,color:"#a78bfa",marginBottom:4}}>VELG VIN</div>
          <select value=${shareWineId||""} onChange=${function(e){setShareWineId(e.target.value||null)}} style=${iS}>
            <option value="">-- Velg en vin --</option>
            ${wines.map(function(w){return html`<option key=${w.id} value=${w.id}>${w.producer?w.producer+" - ":""}${w.name} ${w.vintage}</option>`})}
          </select>
        </div>`}
        <div style=${{fontSize:11,color:"#a78bfa",marginBottom:4}}>E-POST TIL MOTTAKER</div>
        <input placeholder="venn@eksempel.no" value=${shareEmail} onChange=${function(e){setShareEmail(e.target.value)}} style=${iS}/>
        <button onClick=${createShare} style=${{width:"100%",padding:12,borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#5b21b6)",border:"none",color:"white",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:16}}>${shareType==="wine"?"Del denne vinen":"Del hele samlingen"}</button>
        ${shares.outgoing.length>0&&html`<div style=${{marginBottom:16}}>
          <div style=${{fontSize:13,fontWeight:600,color:"#c4b5fd",marginBottom:8}}>Delt av deg</div>
          ${shares.outgoing.map(function(sh){
            var wineName="";
            if(sh.share_type==="wine"&&sh.wine_id){var found=wines.find(function(w){return w.id===sh.wine_id});if(found)wineName=" ("+found.name+")";}
            return html`<div key=${sh.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"rgba(255,255,255,0.04)",border:"1px solid #2a1a3a",borderRadius:8,marginBottom:4}}>
              <div>
                <div style=${{fontSize:13}}>${sh.invited_email}</div>
                <div style=${{fontSize:11,color:"#6b7280"}}>${sh.share_type==="collection"?"Hele samlingen":"Enkeltvin"+wineName} - ${sh.status}</div>
              </div>
            </div>`
          })}
        </div>`}
        ${shares.incoming.length>0&&html`<div>
          <div style=${{fontSize:13,fontWeight:600,color:"#c4b5fd",marginBottom:8}}>Delt med deg</div>
          ${shares.incoming.map(function(sh){return html`<div key=${sh.id} style=${{padding:"8px 12px",background:"rgba(255,255,255,0.04)",border:"1px solid #2a1a3a",borderRadius:8,marginBottom:4,fontSize:13}}>${sh.share_type==="collection"?"Hele samlingen":"Enkeltvin"} fra ${sh.invited_email||"en venn"}</div>`})}
        </div>`}
        ${shares.outgoing.length===0&&shares.incoming.length===0&&html`<div style=${{textAlign:"center",color:"#6b7280",padding:20,fontSize:13}}>Ingen delinger ennaa.</div>`}
      </div>`}

      ${tab===4&&html`<div>
        <div style=${{textAlign:"center",marginBottom:20}}>
          <div style=${{fontSize:48,marginBottom:8}}>${"\uD83D\uDC64"}</div>
          <div style=${{fontSize:18,fontWeight:700}}>${profile?profile.display_name:"..."}</div>
          <div style=${{color:"#a78bfa",fontSize:13}}>${session.user.email}</div>
        </div>
        <div style=${{padding:14,background:"rgba(255,255,255,0.03)",border:"1px solid #2a1a3a",borderRadius:12,marginBottom:16}}>
          <div style=${{fontSize:13,fontWeight:600,marginBottom:8}}>Kjelleren din</div>
          <div style=${{display:"flex",justifyContent:"center",marginBottom:12}}>
            <div style=${{fontSize:36,fontWeight:700,color:"#a78bfa"}}>${totalBottles}</div>
            <div style=${{color:"#9ca3af",fontSize:13,marginLeft:8,alignSelf:"flex-end",paddingBottom:4}}>flasker totalt</div>
          </div>
          <div style=${{fontSize:13,fontWeight:600,marginBottom:8}}>Fordeling</div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontSize:13}}>
            ${TYPE_ORDER.filter(function(t){return typeCounts[t]}).map(function(t){return html`<div key=${t} style=${{padding:10,background:"rgba(255,255,255,0.04)",borderRadius:8,textAlign:"center",borderLeft:"3px solid "+(typeColors[t]||"#6b7280")}}>
              <div style=${{fontSize:20,fontWeight:700,color:typeColors[t]||"#6b7280"}}>${typeCounts[t]}</div>
              <div style=${{color:"#9ca3af",fontSize:11}}>${t}</div>
            </div>`})}
          </div>
        </div>
        <div style=${{padding:14,background:"rgba(255,255,255,0.03)",border:"1px solid #2a1a3a",borderRadius:12,marginBottom:16}}>
          <div style=${{fontSize:13,fontWeight:600,marginBottom:8}}>Geografi</div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13}}>
            <div style=${{padding:10,background:"rgba(124,58,237,0.1)",borderRadius:8,textAlign:"center"}}><div style=${{fontSize:24,fontWeight:700,color:"#a78bfa"}}>${statC}</div><div style=${{color:"#9ca3af",fontSize:11}}>Land</div></div>
            <div style=${{padding:10,background:"rgba(124,58,237,0.1)",borderRadius:8,textAlign:"center"}}><div style=${{fontSize:24,fontWeight:700,color:"#a78bfa"}}>${statR}</div><div style=${{color:"#9ca3af",fontSize:11}}>Regioner</div></div>
          </div>
        </div>
        <button onClick=${logout} style=${{width:"100%",padding:14,borderRadius:12,background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.27)",color:"#f87171",fontSize:15,fontWeight:600,cursor:"pointer"}}>Logg ut</button>
      </div>`}
    </div>
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
